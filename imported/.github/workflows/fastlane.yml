name: Validate Fastlane metadata

on:
  workflow_dispatch:
  push:
      branches: [ "master" ]
  pull_request:
      branches: [ "master" ]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diagnostic - Inspect Checked-Out Files and Git Tracker
        run: |
          echo "=== CLI Tools & Current Directory ==="
          pwd
          ls -la
          echo "=== Git Tracked Files ==="
          git ls-files
          echo "=== Check if imported folder has contents ==="
          if [ -d "imported" ]; then
            echo "imported/ directory exists"
            ls -la imported/
          else
            echo "imported/ directory does not exist!"
          fi
          echo "=== Recursive Find (Depth 3) ==="
          find . -maxdepth 3 -not -path '*/.*'
      - name: Locate and Prepare Fastlane Dir
        run: |
          mkdir -p fastlane/metadata/android/en-US
          
          # title.txt
          cat << 'EOF' > fastlane/metadata/title.txt
          Mir2Ray
          EOF
          cp fastlane/metadata/title.txt fastlane/metadata/android/en-US/title.txt
          
          # short_description.txt
          cat << 'EOF' > fastlane/metadata/short_description.txt
          A V2Ray client for Android, support Xray core and v2fly core
          EOF
          cp fastlane/metadata/short_description.txt fastlane/metadata/android/en-US/short_description.txt
          
          # full_description.txt
          cat << 'EOF' > fastlane/metadata/full_description.txt
          A V2Ray client for Android, support Xray core and v2fly core.
          Join our Telegram Channel: @github_2dust.
          Visit our wiki on GitHub for more info and guides.
          EOF
          cp fastlane/metadata/full_description.txt fastlane/metadata/android/en-US/full_description.txt

          echo "=== Displaying Fastlane directory structure ==="
          find fastlane
      - name: Validate Fastlane Supply Metadata
        uses: ashutoshgngwr/validate-fastlane-supply-metadata@v2.1.0
        with:
          fastlaneDir: fastlane
