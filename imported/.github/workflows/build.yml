name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Custom Tag for release (e.g. v1.10.32-r3)'
        required: false
        type: string
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Diagnostic - Inspect Checked-Out Files and Git Tracker
      run: |
        echo "=== CLI Tools & Current Directory ==="
        pwd
        ls -la
        echo "=== Git Tracked Files ==="
        git ls-files
        echo "=== Check if imported folder has contents ==="
        if [ -d "imported" ]; then
          echo "imported/ directory exists"
          ls -la imported/
        else
          echo "imported/ directory does not exist!"
        fi
        echo "=== Recursive Find (Depth 3) ==="
        find . -maxdepth 3 -not -path '*/.*'

    - name: Ensure Submodules are Cloned and Build Scripts Generated
      run: |
        echo "=== Checking and cloning submodules if empty ==="
        BASE_DIR="imported"
        if [ ! -d "imported" ]; then
          BASE_DIR="."
        fi
        echo "Submodule base directory is: $BASE_DIR"

        mkdir -p "$BASE_DIR"

        # Dynamically generate compilation scripts to ensure they are always present on the runner
        echo "Generating compile-tun2socks.sh..."
        cat << 'EOF' > "$BASE_DIR/compile-tun2socks.sh"
#!/bin/bash
set -o errexit
set -o pipefail
set -o nounset
__dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
if [[ ! -d $NDK_HOME ]]; then
	echo "Android NDK: NDK_HOME not found. please set env \$NDK_HOME"
	exit 1
fi
TMPDIR=$(mktemp -d)
clear_tmp () {
  rm -rf $TMPDIR
}
trap 'echo -e "Aborted, error $? in command: $BASH_COMMAND"; trap ERR; clear_tmp; exit 1' ERR INT
install -m644 $__dir/tun2socks.mk $TMPDIR/
pushd $TMPDIR
ln -s $__dir/badvpn badvpn
ln -s $__dir/libancillary libancillary
$NDK_HOME/ndk-build \
	NDK_PROJECT_PATH=. \
	APP_BUILD_SCRIPT=./tun2socks.mk \
	APP_ABI=all \
	APP_PLATFORM=android-21 \
	NDK_LIBS_OUT=$TMPDIR/libs \
	NDK_OUT=$TMPDIR/tmp \
	APP_SHORT_COMMANDS=false LOCAL_SHORT_COMMANDS=false -B -j4
cp -r $TMPDIR/libs $__dir/
popd
rm -rf $TMPDIR
EOF
        chmod +x "$BASE_DIR/compile-tun2socks.sh"

        echo "Generating compile-hevtun.sh..."
        cat << 'EOF' > "$BASE_DIR/compile-hevtun.sh"
#!/bin/bash
set -o errexit
set -o pipefail
set -o nounset
__dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
if [[ ! -d $NDK_HOME ]]; then
	echo "Android NDK: NDK_HOME not found. please set env \$NDK_HOME"
	exit 1
fi
TMPDIR=$(mktemp -d)
clear_tmp () {
  rm -rf $TMPDIR
}
trap 'echo -e "Aborted, error $? in command: $BASH_COMMAND"; trap ERR; clear_tmp; exit 1' ERR INT

mkdir -p "$TMPDIR/jni"
pushd "$TMPDIR"
echo 'include $(call all-subdir-makefiles)' > jni/Android.mk
ln -s "$__dir/hev-socks5-tunnel" jni/hev-socks5-tunnel
"$NDK_HOME/ndk-build" \
    NDK_PROJECT_PATH=. \
    APP_BUILD_SCRIPT=jni/Android.mk \
	"APP_ABI=armeabi-v7a arm64-v8a x86 x86_64" \
	APP_PLATFORM=android-21 \
    NDK_LIBS_OUT="$TMPDIR/libs" \
    NDK_OUT="$TMPDIR/obj" \
    "APP_CFLAGS=-O3 -DPKGNAME=com/v2ray/ang/service" \
    "APP_LDFLAGS=-Wl,--build-id=none -Wl,--hash-style=gnu"
cp -r "$TMPDIR/libs/"* "$__dir/libs/"
popd
rm -rf $TMPDIR
EOF
        chmod +x "$BASE_DIR/compile-hevtun.sh"

        echo "Generating libhysteria2.sh..."
        cat << 'EOF' > "$BASE_DIR/libhysteria2.sh"
#!/bin/bash
targets=(
  "aarch64-linux-android21 arm64 arm64-v8a"
  "armv7a-linux-androideabi21 arm armeabi-v7a"
  "x86_64-linux-android21 amd64 x86_64"
  "i686-linux-android21 386 x86"
)
cd "hysteria" || exit
for target in "${targets[@]}"; do
  IFS=' ' read -r ndk_target goarch abi <<< "$target"
  echo "Building for ${abi} with ${ndk_target} (${goarch})"
  CC="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${ndk_target}-clang" CGO_ENABLED=1 GOOS=android GOARCH=$goarch go build -o libs/$abi/libhysteria2.so -trimpath -ldflags "-s -w -buildid=" -buildvcs=false ./app
  echo "Built libhysteria2.so for ${abi}"
done
EOF
        chmod +x "$BASE_DIR/libhysteria2.sh"

        echo "Generating tun2socks.mk..."
        cat << 'EOF' > "$BASE_DIR/tun2socks.mk"
LOCAL_PATH := $(call my-dir)
ROOT_PATH := $(LOCAL_PATH)
include $(CLEAR_VARS)
ANCILLARY_SOURCE := fd_recv.c fd_send.c
LOCAL_MODULE := libancillary
LOCAL_C_INCLUDES := $(LOCAL_PATH)/libancillary
LOCAL_SRC_FILES := $(addprefix libancillary/, $(ANCILLARY_SOURCE))
include $(BUILD_STATIC_LIBRARY)
include $(CLEAR_VARS)
LOCAL_CFLAGS := -std=gnu99
LOCAL_CFLAGS += -DBADVPN_THREADWORK_USE_PTHREAD -DBADVPN_LINUX -DBADVPN_BREACTOR_BADVPN -D_GNU_SOURCE
LOCAL_CFLAGS += -DBADVPN_USE_SIGNALFD -DBADVPN_USE_EPOLL
LOCAL_CFLAGS += -DBADVPN_LITTLE_ENDIAN -DBADVPN_THREAD_SAFE
LOCAL_CFLAGS += -DNDEBUG -DANDROID
LOCAL_CFLAGS += -I
LOCAL_STATIC_LIBRARIES := libancillary
LOCAL_C_INCLUDES := \
        $(LOCAL_PATH)/badvpn/lwip/src/include/ipv4 \
        $(LOCAL_PATH)/badvpn/lwip/src/include/ipv6 \
        $(LOCAL_PATH)/badvpn/lwip/src/include \
        $(LOCAL_PATH)/badvpn/lwip/custom \
        $(LOCAL_PATH)/badvpn \
	$(LOCAL_PATH)/libancillary
TUN2SOCKS_SOURCES := \
        base/BLog_syslog.c \
        system/BReactor_badvpn.c \
        system/BSignal.c \
        system/BConnection_common.c \
        system/BConnection_unix.c \
        system/BTime.c \
        system/BUnixSignal.c \
        system/BNetwork.c \
        system/BDatagram_common.c \
        system/BDatagram_unix.c \
        flow/StreamRecvInterface.c \
        flow/PacketRecvInterface.c \
        flow/PacketPassInterface.c \
        flow/StreamPassInterface.c \
        flow/SinglePacketBuffer.c \
        flow/BufferWriter.c \
        flow/PacketBuffer.c \
        flow/PacketStreamSender.c \
        flow/PacketPassConnector.c \
        flow/PacketProtoFlow.c \
        flow/PacketPassFairQueue.c \
        flow/PacketProtoEncoder.c \
        flow/PacketProtoDecoder.c \
        socksclient/BSocksClient.c \
        tuntap/BTap.c \
        lwip/src/core/udp.c \
        lwip/src/core/memp.c \
        lwip/src/core/init.c \
        lwip/src/core/pbuf.c \
        lwip/src/core/tcp.c \
        lwip/src/core/tcp_out.c \
        lwip/src/core/netif.c \
        lwip/src/core/def.c \
        lwip/src/core/ip.c \
        lwip/src/core/mem.c \
        lwip/src/core/tcp_in.c \
        lwip/src/core/stats.c \
        lwip/src/core/inet_chksum.c \
        lwip/src/core/timeouts.c \
        lwip/src/core/ipv4/icmp.c \
        lwip/src/core/ipv4/igmp.c \
        lwip/src/core/ipv4/ip4_addr.c \
        lwip/src/core/ipv4/ip4_frag.c \
        lwip/src/core/ipv4/ip4.c \
        lwip/src/core/ipv4/autoip.c \
        lwip/src/core/ipv6/ethip6.c \
        lwip/src/core/ipv6/inet6.c \
        lwip/src/core/ipv6/ip6_addr.c \
        lwip/src/core/ipv6/mld6.c \
        lwip/src/core/ipv6/dhcp6.c \
        lwip/src/core/ipv6/icmp6.c \
        lwip/src/core/ipv6/ip6.c \
        lwip/src/core/ipv6/ip6_frag.c \
        lwip/src/core/ipv6/nd6.c \
        lwip/custom/sys.c \
        tun2socks/tun2socks.c \
        base/DebugObject.c \
        base/BLog.c \
        base/BPending.c \
        flowextra/PacketPassInactivityMonitor.c \
        tun2socks/SocksUdpGwClient.c \
        udpgw_client/UdpGwClient.c \
        socks_udp_client/SocksUdpClient.c
LOCAL_MODULE := tun2socks
LOCAL_LDLIBS := -ldl -llog
LOCAL_LDFLAGS=-Wl,--build-id=none
LOCAL_SRC_FILES := $(addprefix badvpn/, $(TUN2SOCKS_SOURCES))
LOCAL_BUILD_SCRIPT := BUILD_EXECUTABLE
LOCAL_MAKEFILE     := $(local-makefile)
$(call check-defined-LOCAL_MODULE,$(LOCAL_BUILD_SCRIPT))
$(call check-LOCAL_MODULE,$(LOCAL_MAKEFILE))
$(call check-LOCAL_MODULE_FILENAME)
my := TARGET_
$(call handle-module-filename,lib,$(TARGET_SONAME_EXTENSION))
$(call handle-module-built)
LOCAL_MODULE_CLASS := EXECUTABLE
include $(BUILD_SYSTEM)/build-module.mk
EOF
        
        # 1. badvpn
        if [ ! -d "$BASE_DIR/badvpn" ] || [ -z "$(ls -A "$BASE_DIR/badvpn" 2>/dev/null)" ]; then
          echo "Cloning badvpn..."
          rm -rf "$BASE_DIR/badvpn"
          git clone --depth 1 https://github.com/XTLS/badvpn "$BASE_DIR/badvpn"
        fi
        
        # 2. libancillary
        if [ ! -d "$BASE_DIR/libancillary" ] || [ -z "$(ls -A "$BASE_DIR/libancillary" 2>/dev/null)" ]; then
          echo "Cloning libancillary..."
          rm -rf "$BASE_DIR/libancillary"
          git clone --depth 1 https://github.com/shadowsocks/libancillary "$BASE_DIR/libancillary"
        fi
        
        # 3. hev-socks5-tunnel (Needs recursive clone for yaml, lwip, hev-task-system)
        if [ ! -d "$BASE_DIR/hev-socks5-tunnel" ] || [ -z "$(ls -A "$BASE_DIR/hev-socks5-tunnel" 2>/dev/null)" ]; then
          echo "Cloning hev-socks5-tunnel with submodules..."
          rm -rf "$BASE_DIR/hev-socks5-tunnel"
          git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/heiher/hev-socks5-tunnel "$BASE_DIR/hev-socks5-tunnel"
        fi
        
        # 4. AndroidLibXrayLite
        if [ ! -d "$BASE_DIR/AndroidLibXrayLite" ] || [ -z "$(ls -A "$BASE_DIR/AndroidLibXrayLite" 2>/dev/null)" ]; then
          echo "Cloning AndroidLibXrayLite..."
          rm -rf "$BASE_DIR/AndroidLibXrayLite"
          git clone --depth 1 https://github.com/2dust/AndroidLibXrayLite "$BASE_DIR/AndroidLibXrayLite"
        fi
        
        # 5. hysteria
        if [ ! -d "$BASE_DIR/hysteria" ] || [ -z "$(ls -A "$BASE_DIR/hysteria" 2>/dev/null)" ]; then
          echo "Cloning hysteria..."
          rm -rf "$BASE_DIR/hysteria"
          git clone --depth 1 https://github.com/apernet/hysteria "$BASE_DIR/hysteria"
        fi
        
        echo "=== Finished Submodule Preparation ==="

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '12266719'
        packages: 'platforms;android-35 build-tools;35.0.0 platform-tools ndk;28.2.13676358'

    - name: Configure NDK environment and gradle
      run: |
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        GRADLE_PATH=$(find . -name "build.gradle.kts" | grep "V2rayNG/app" | head -n 1)
        if [ ! -z "$GRADLE_PATH" ]; then
          echo "Found gradle path at: $GRADLE_PATH"
          sed -i '10i\
          \
              ndkVersion = "28.2.13676358"' "$GRADLE_PATH"
        else
          echo "Warning: build.gradle.kts not found!"
        fi

    - name: Restore cached libtun2socks
      id: cache-libtun2socks-restore
      uses: actions/cache/restore@v4
      with:
        path: |
          libs
          imported/libs
        key: libtun2socks-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('**/compile-tun2socks.sh') }}
        restore-keys: |
          libtun2socks-${{ runner.os }}-${{ env.NDK_HOME }}-

    - name: Build libtun2socks
      if: steps.cache-libtun2socks-restore.outputs.cache-hit != 'true'
      run: |
        SCRIPT_PATH=$(find . -name "compile-tun2socks.sh" | head -n 1)
        if [ ! -z "$SCRIPT_PATH" ]; then
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          echo "Running tun2socks compilations inside $SCRIPT_DIR"
          pushd "$SCRIPT_DIR"
          chmod +x compile-tun2socks.sh compile-hevtun.sh
          sed -i 's/\r$//' compile-tun2socks.sh
          sed -i 's/\r$//' compile-hevtun.sh
          ./compile-tun2socks.sh && ./compile-hevtun.sh
          popd
        else
          echo "Error: compile-tun2socks.sh not found!"
          exit 1
        fi
    
    - name: Save libtun2socks
      if: steps.cache-libtun2socks-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          libs
          imported/libs
        key: libtun2socks-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('**/compile-tun2socks.sh') }}

    - name: Copy libtun2socks
      run: |
        LIBS_SOURCE=$(find . -maxdepth 3 -type d -name "libs" | grep -v "V2rayNG" | grep -v "hysteria" | head -n 1)
        V2RAY_APP=$(find . -type d -name "app" | grep "V2rayNG" | head -n 1)
        if [ ! -z "$LIBS_SOURCE" ] && [ ! -z "$V2RAY_APP" ]; then
          echo "Copying from $LIBS_SOURCE to $V2RAY_APP"
          cp -r "$LIBS_SOURCE" "$V2RAY_APP/"
        else
          echo "Error: libs or V2rayNG/app not found!"
          exit 1
        fi

    - name: Fetch AndroidLibXrayLite tag
      run: |
        XRAY_DIR=$(find . -type d -name "AndroidLibXrayLite" | head -n 1)
        if [ ! -z "$XRAY_DIR" ]; then
          pushd "$XRAY_DIR"
          CURRENT_TAG=$(git describe --tags --abbrev=0)
          echo "Current tag in this repo: $CURRENT_TAG"
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
          popd
        else
          echo "Error: AndroidLibXrayLite not found!"
          exit 1
        fi

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.12
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.CURRENT_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: 'download_temp'

    - name: Place downloaded libv2ray
      run: |
        V2RAY_LIBS=$(find . -type d -name "libs" | grep "V2rayNG/app" | head -n 1)
        if [ -z "$V2RAY_LIBS" ]; then
          V2RAY_APP=$(find . -type d -name "app" | grep "V2rayNG" | head -n 1)
          mkdir -p "$V2RAY_APP/libs"
          V2RAY_LIBS="$V2RAY_APP/libs"
        fi
        echo "Moving libv2ray.aar to $V2RAY_LIBS"
        cp download_temp/libv2ray.aar "$V2RAY_LIBS/"

    - name: Restore cached libhysteria2
      id: cache-libhysteria2-restore
      uses: actions/cache/restore@v4
      with:
        path: |
          hysteria/libs
          imported/hysteria/libs
        key: libhysteria2-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('**/libhysteria2.sh') }}
        restore-keys: |
          libhysteria2-${{ runner.os }}-${{ env.NDK_HOME }}-

    - name: Setup Golang
      if: steps.cache-libhysteria2-restore.outputs.cache-hit != 'true'
      uses: actions/setup-go@v5.4.0
      with:
        go-version: '1.22.x'
        cache: false

    - name: Build libhysteria2
      if: steps.cache-libhysteria2-restore.outputs.cache-hit != 'true'
      run: |
        HYSTERIA_SCRIPT=$(find . -name "libhysteria2.sh" | head -n 1)
        if [ ! -z "$HYSTERIA_SCRIPT" ]; then
          HYSTERIA_DIR=$(dirname "$HYSTERIA_SCRIPT")
          echo "Running hysteria build in $HYSTERIA_DIR"
          pushd "$HYSTERIA_DIR"
          chmod +x libhysteria2.sh
          sed -i 's/\r$//' libhysteria2.sh
          ./libhysteria2.sh
          popd
        else
          echo "Error: libhysteria2.sh not found!"
          exit 1
        fi

    - name: Save libhysteria2
      if: steps.cache-libhysteria2-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          hysteria/libs
          imported/hysteria/libs
        key: libhysteria2-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('**/libhysteria2.sh') }}

    - name: Copy libhysteria2
      run: |
        HY_LIBS_SOURCE=$(find . -type d -name "libs" | grep "hysteria" | head -n 1)
        V2RAY_APP=$(find . -type d -name "app" | grep "V2rayNG" | head -n 1)
        if [ ! -z "$HY_LIBS_SOURCE" ] && [ ! -z "$V2RAY_APP" ]; then
          echo "Copying from $HY_LIBS_SOURCE to $V2RAY_APP"
          cp -r "$HY_LIBS_SOURCE" "$V2RAY_APP/"
        else
          echo "Error: Hysteria libs or V2rayNG/app not found!"
          exit 1
        fi

    - name: Setup Java
      uses: actions/setup-java@v4.7.0
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Check Keystore Availability
      run: |
        if [ ! -z "${{ secrets.APP_KEYSTORE_BASE64 }}" ]; then
          echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
        else
          echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
        fi

    - name: Decode Keystore
      if: env.HAS_KEYSTORE == 'true'
      uses: timheuer/base64-to-file@v1.2.4
      id: android_keystore
      with:
        fileName: "android_keystore.jks"
        encodedString: ${{ secrets.APP_KEYSTORE_BASE64 }}

    - name: Build APK
      run: |
        V2RAY_DIR=$(find . -type d -name "V2rayNG" | head -n 1)
        if [ ! -z "$V2RAY_DIR" ]; then
          cd "$V2RAY_DIR"
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod 755 gradlew
          if [ "${{ env.HAS_KEYSTORE }}" = "true" ]; then
            echo "Building signed Release APKs..."
            ./gradlew licenseFdroidReleaseReport
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=${{ steps.android_keystore.outputs.filePath }} \
              -Pandroid.injected.signing.store.password=${{ secrets.APP_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.APP_KEYSTORE_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.APP_KEY_PASSWORD }}
          else
            echo "No signing keystore provided. Building Debug APKs..."
            ./gradlew assembleFdroidDebug assembleDebug
          fi
        else
          echo "Error: V2rayNG directory not found!"
          exit 1
        fi

    - name: Prepare Tag and Output Info
      id: prep_tag
      run: |
        GRADLE_KTS=$(find . -name "build.gradle.kts" | grep "V2rayNG/app" | head -n 1)
        if [ ! -z "$GRADLE_KTS" ]; then
          VERSION_NAME=$(python3 -c "import re; content=open('$GRADLE_KTS').read(); print(re.search(r'versionName\s*=\s*\"([^\"]+)\"', content).group(1))")
          echo "Version extracted: $VERSION_NAME"
          if [ ! -z "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="v${VERSION_NAME}-r${{ github.run_number }}"
          fi
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
        else
          echo "Error: build.gradle.kts not found!"
          exit 1
        fi

    - name: Collect Built APKs
      run: |
        mkdir -p ${{ github.workspace }}/apks
        find . -path "*/build/outputs/apk/*.apk" -type f | while read -r apk; do
          if [[ "$apk" != *"-unaligned"* ]]; then
            cp "$apk" ${{ github.workspace }}/apks/
          fi
        done
        echo "Collected apks:"
        ls -la ${{ github.workspace }}/apks/

    - name: Update README with New Version and Links
      shell: python
      run: |
        import re
        import os

        repo = os.environ.get("GITHUB_REPOSITORY", "desmondep/Mir2Ray")
        tag = os.environ.get("RELEASE_TAG", "v1.10.32-r3")
        version_num = tag.lstrip('v').split('-')[0]

        files_to_update = []
        for root, dirs, files in os.walk("."):
            dirs[:] = [d for d in dirs if not d.startswith('.')]
            for f in files:
                if f.lower() == "readme.md":
                    files_to_update.append(os.path.join(root, f))

        print(f"Updating README files: {files_to_update}")
        for filepath in files_to_update:
            with open(filepath, "r", encoding="utf-8") as f:
                content = f.read()

            abis = ["universal", "arm64-v8a", "armeabi-v7a", "x86_64", "x86"]
            for abi in abis:
                pattern = r"https://github\.com/[^/]+/[^/]+/releases/(?:latest/download|download/[^/]+)/v2rayNG_[0-9.]+-fdroid_" + abi + r"\.apk"
                new_url = f"https://github.com/{repo}/releases/download/{tag}/v2rayNG_{version_num}-fdroid_{abi}.apk"
                content = re.sub(pattern, new_url, content)

            # Update absolute repo/release URLs
            content = re.sub(r"https://img\.shields\.io/github/downloads/[^/]+/[^/]+/total", f"https://img.shields.io/github/downloads/{repo}/total", content)
            content = re.sub(r"https://github\.com/[^/]+/[^/]+/releases", f"https://github.com/{repo}/releases", content)

            # Update current version section header
            content = re.sub(r"تغییرات نسخه فعلی \([^\)]+\)", f"تغییرات نسخه فعلی ({tag})", content)

            with open(filepath, "w", encoding="utf-8") as f:
                f.write(content)
        print("Updated README.md contents successfully!")

    - name: Commit and Push README Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        find . -name "README.md" | while read -r readme; do
          git add "$readme"
        done
        git diff-index --quiet HEAD || git commit -m "docs: update README.md for version ${{ env.RELEASE_TAG }} [skip ci]"
        git push origin master || echo "No changes or failed to push"

    - name: Prepare Release Notes
      run: |
        cat << 'EOF' > release_body.md
        # Mir2Ray ${{ env.RELEASE_TAG }}
        
        ## تغییرات این نسخه / Changelog:
        EOF
        NOTES_FILE=$(find . -maxdepth 2 -name "release_notes_v*.md" | head -n 1)
        if [ ! -z "$NOTES_FILE" ] && [ -f "$NOTES_FILE" ]; then
          echo "Appending notes from $NOTES_FILE"
          cat "$NOTES_FILE" >> release_body.md
        else
          echo "Automated compilation of built APKs for version ${{ env.RELEASE_TAG }}." >> release_body.md
        fi

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Mir2Ray ${{ env.RELEASE_TAG }}
        body_path: ${{ github.workspace }}/release_body.md
        files: |
          ${{ github.workspace }}/apks/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
