name: Validate Fastlane metadata

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diagnostic - Inspect Checked-Out Files and Git Tracker
        run: |
          echo "=== CLI Tools & Current Directory ==="
          pwd
          ls -la
          echo "=== Git Tracked Files ==="
          git ls-files
          echo "=== Check if imported folder has contents ==="
          if [ -d "imported" ]; then
            echo "imported/ directory exists"
            ls -la imported/
          else
            echo "imported/ directory does not exist!"
          fi
          echo "=== Recursive Find (Depth 3) ==="
          find . -maxdepth 3 -not -path '*/.*'
      - name: Locate and Prepare Fastlane Dir
        run: |
          if [ -d "imported/fastlane" ]; then
            echo "Found fastlane under imported/"
            cp -r imported/fastlane ./fastlane
          elif [ -d "fastlane" ]; then
            echo "Found fastlane at root"
          else
            echo "Error: fastlane directory not found!"
            exit 1
          fi
      - name: Validate Fastlane Supply Metadata
        uses: ashutoshgngwr/validate-fastlane-supply-metadata@v2.1.0
        with:
          fastlaneDir: fastlane
